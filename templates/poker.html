{% extends "base.html" %}
{% block title %}Poker — Casino Royale{% endblock %}

{% block body %}
<div class="site-header">
  <a href="/" class="back-btn" id="back-btn">← Lobby</a>
  <h1>♥ &nbsp;TEXAS HOLD'EM&nbsp; ♦</h1>
  <div class="bankroll-display" id="bankroll">$1,000</div>
</div>
<div class="gold-line"></div>

<div class="poker-page">

  <!-- Main table -->
  <div class="table-felt poker-table">

    <!-- Community cards -->
    <div>
      <div class="flex justify-between items-center" style="margin-bottom:6px;">
        <div class="section-label">COMMUNITY CARDS</div>
        <div class="pot-display" id="pot-display"></div>
      </div>
      <div class="community-row" id="community-cards"></div>
    </div>

    <!-- Result banner -->
    <div class="result-banner" id="result-banner"></div>

    <!-- Player hole cards -->
    <div>
      <div class="flex justify-between items-center" style="margin-bottom:6px;">
        <div class="section-label">YOUR HOLE CARDS</div>
        <div class="hand-name" id="hand-name"></div>
      </div>
      <div class="cards-row" id="player-cards"></div>
    </div>

    <!-- Controls — always visible at bottom -->
    <div class="poker-controls">
      <div id="bet-controls" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <div>
          <div style="font-size:0.7rem;color:#777;margin-bottom:4px;">SELECT CHIP</div>
          <div class="chip-row">
            <button class="chip chip-5"   onclick="setChip(5)">$5</button>
            <button class="chip chip-10"  onclick="setChip(10)">$10</button>
            <button class="chip chip-25"  onclick="setChip(25)">$25</button>
            <button class="chip chip-50"  onclick="setChip(50)">$50</button>
            <button class="chip chip-100" onclick="setChip(100)">$100</button>
            <button class="chip chip-500" onclick="setChip(500)">$500</button>
          </div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:0.7rem;color:#777;">ANTE</div>
          <div class="bet-display" id="bet-display">$0</div>
          <button class="btn btn-dark btn-sm" onclick="clearBet()">Clear</button>
        </div>
        <button class="btn btn-gold btn-lg" id="btn-deal" onclick="deal()">DEAL</button>
      </div>

      <div id="round-controls" style="display:none;gap:12px;">
        <button class="btn btn-green btn-lg" onclick="check()">CHECK</button>
        <button class="btn btn-red btn-lg"   onclick="fold()">FOLD</button>
      </div>
    </div>

  </div>

  <!-- AI Panel -->
  <div class="ai-panel" style="overflow-y:auto;">
    <h3>AI PLAYERS</h3>
    <div id="ai-cards-container"></div>
    <div style="border-top:1px solid var(--gold-dim);margin-top:4px;padding-top:8px;">
      <div style="font-size:0.7rem;font-weight:bold;color:var(--gold);margin-bottom:4px;">LAST ROUND</div>
      <div id="last-round"></div>
    </div>
    <div class="leaderboard" style="margin-top:4px;">
      <h4>LEADERBOARD</h4>
      <div id="leaderboard"></div>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/poker.js') }}"></script>
{% endblock %}
